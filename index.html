<!DOCTYPE html><html lang="pt-BR"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seu IPv4</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Inter', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

#particles-js {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
}

.container {
    position: relative;
    z-index: 1;
    text-align: center;
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.discord-link {
    font-size: 13px;
    color: #666;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 32px;
}

.discord-link a {
    color: #8b5cf6;
    text-decoration: none;
    transition: color 0.3s;
}

.discord-link a:hover {
    color: #a78bfa;
}

.label {
    font-size: 12px;
    color: #555;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 12px;
}

.ip-display {
    font-size: 42px;
    font-weight: 300;
    letter-spacing: 2px;
    color: #fff;
    margin-bottom: 32px;
    min-height: 50px;
    transition: all 0.3s;
}

.ip-display.loading {
    color: #333;
    font-size: 16px;
}

.copy-btn {
    position: relative;
    background: transparent;
    border: 1px solid rgba(139, 92, 246, 0.3);
    color: #8b5cf6;
    padding: 12px 40px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.4s ease;
    overflow: hidden;
}

.copy-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.1), transparent);
    transition: left 0.5s;
}

.copy-btn:hover {
    border-color: rgba(139, 92, 246, 0.6);
    box-shadow: 0 0 15px rgba(139, 92, 246, 0.15), 0 0 30px rgba(139, 92, 246, 0.05);
    color: #a78bfa;
}

.copy-btn:hover::before {
    left: 100%;
}

.copy-btn:active {
    transform: scale(0.97);
}

.copy-btn.copied {
    border-color: rgba(139, 92, 246, 0.8);
    box-shadow: 0 0 20px rgba(139, 92, 246, 0.2), 0 0 40px rgba(139, 92, 246, 0.08);
    color: #a78bfa;
}

.copy-btn.copied::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;
    background: rgba(139, 92, 246, 0.1);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    animation: ripple 0.6s ease-out;
}

@keyframes ripple {
    to {
        width: 300px;
        height: 300px;
        opacity: 0;
    }
}
</style>
</head>
<body>

<div id="particles-js"></div>

<div class="container">
    <div class="discord-link">
        <a href="https://discord.gg/zeex" target="_blank">discord.gg/dashh</a>
    </div>
    <div class="label">Seu IPv4</div>
    <div class="ip-display loading" id="ip">carregando...</div>
    <button class="copy-btn" id="copyBtn" onclick="copyIP()">Copiar</button>
</div>

<script src="particles.min.js"></script>
<script>
particlesJS('particles-js', {
    particles: {
        number: { value: 60, density: { enable: true, value_area: 900 } },
        color: { value: '#8b5cf6' },
        shape: { type: 'circle' },
        opacity: { value: 0.15, random: true, anim: { enable: true, speed: 0.5, opacity_min: 0.05, sync: false } },
        size: { value: 2, random: true, anim: { enable: true, speed: 1, size_min: 0.5, sync: false } },
        line_linked: { enable: true, distance: 150, color: '#8b5cf6', opacity: 0.06, width: 1 },
        move: { enable: true, speed: 0.8, direction: 'none', random: true, straight: false, out_mode: 'out', bounce: false }
    },
    interactivity: {
        detect_on: 'canvas',
        events: {
            onhover: { enable: true, mode: 'grab' },
            onclick: { enable: false },
            resize: true
        },
        modes: {
            grab: { distance: 140, line_linked: { opacity: 0.15 } }
        }
    },
    retina_detect: true
});

fetch('https://api.ipify.org?format=json')
    .then(r => r.json())
    .then(data => {
        const el = document.getElementById('ip');
        el.textContent = data.ip;
        el.classList.remove('loading');
    })
    .catch(() => {
        document.getElementById('ip').textContent = 'Erro ao obter IP';
    });

function copyIP() {
    const ip = document.getElementById('ip').textContent;
    const btn = document.getElementById('copyBtn');
    if (ip === 'carregando...' || ip === 'Erro ao obter IP') return;

    function onCopied() {
        btn.textContent = 'Copiado';
        btn.classList.add('copied');
        setTimeout(() => {
            btn.textContent = 'Copiar';
            btn.classList.remove('copied');
        }, 2000);
    }

    if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(ip).then(onCopied);
    } else {
        const ta = document.createElement('textarea');
        ta.value = ip;
        ta.style.position = 'fixed';
        ta.style.left = '-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        onCopied();
    }
}
</script>



</body></html>
