<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IP</title>
</head>
<body>

<span id="ip"></span>

<script>
fetch("https://api.ipify.org?format=json")
.then(response => response.json())
.then(data => {
    document.getElementById("ip").textContent = data.ip;
});
</script>

</body>
</html>
