<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Certificado Proxy</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
    margin-top:120px;
}

.btn{
    background:#2ecc71;
    padding:15px 35px;
    border-radius:8px;
    text-decoration:none;
    color:white;
    font-size:18px;
    border:none;
    cursor:pointer;
    margin:10px;
}

.ipbox{
    margin-top:20px;
    font-size:20px;
    color:#00ffcc;
}
</style>

</head>

<body>

<h2>Instalar Certificado</h2>
<p>Clique abaixo para baixar e instalar</p>

<a class="btn" href="certificado.pem">
Instalar Certificado
</a>

<br>

<button class="btn" onclick="mostrarIP()">
Mostrar meu IP
</button>

<div class="ipbox" id="ip"></div>

<script>

function mostrarIP(){

fetch("https://api.ipify.org?format=json")
.then(res => res.json())
.then(data => {

document.getElementById("ip").innerHTML =
"Seu IP atual é: " + data.ip;

});

}

</script>

</body>
</html>
